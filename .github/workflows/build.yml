name: Build APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download offline speech models (Vosk)
        run: |
          mkdir -p app/src/main/assets
          curl -sL -o en.zip https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
          curl -sL -o pt.zip https://alphacephei.com/vosk/models/vosk-model-small-pt-0.3.zip
          unzip -q en.zip
          unzip -q pt.zip
          mv vosk-model-small-en-us-0.15 app/src/main/assets/model-en
          mv vosk-model-small-pt-0.3 app/src/main/assets/model-pt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TalkBridge-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish release (for in-app updates)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk TalkBridge.apk
          gh release create "v${{ github.run_number }}" TalkBridge.apk \
            --title "TalkBridge build ${{ github.run_number }}" \
            --notes "Automated build from commit ${{ github.sha }}"
