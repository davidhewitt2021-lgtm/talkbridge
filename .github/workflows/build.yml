name: Build APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download sherpa-onnx Android library
        run: |
          mkdir -p app/libs
          curl -sL -o app/libs/sherpa-onnx.aar \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.14/sherpa-onnx-1.12.14.aar

      - name: Download Whisper models and Silero VAD
        run: |
          mkdir -p app/src/main/assets/whisper app/src/main/assets/lid app/src/main/assets/vad
          curl -sL -o whisper.tar.bz2 \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-whisper-small.tar.bz2
          tar xf whisper.tar.bz2
          cp sherpa-onnx-whisper-small/small-encoder.int8.onnx app/src/main/assets/whisper/
          cp sherpa-onnx-whisper-small/small-decoder.int8.onnx app/src/main/assets/whisper/
          cp sherpa-onnx-whisper-small/small-tokens.txt        app/src/main/assets/whisper/
          curl -sL -o tiny.tar.bz2 \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-whisper-tiny.tar.bz2
          tar xf tiny.tar.bz2
          cp sherpa-onnx-whisper-tiny/tiny-encoder.int8.onnx app/src/main/assets/lid/
          cp sherpa-onnx-whisper-tiny/tiny-decoder.int8.onnx app/src/main/assets/lid/
          curl -sL -o app/src/main/assets/vad/silero_vad.onnx \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/silero_vad.onnx
          ls -lh app/src/main/assets/whisper app/src/main/assets/lid app/src/main/assets/vad

      - name: Restore signing key
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/talkbridge.keystore

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: /home/runner/talkbridge.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TalkBridge-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Publish release (for in-app updates)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk TalkBridge.apk
          gh release create "v${{ github.run_number }}" TalkBridge.apk \
            --title "TalkBridge build ${{ github.run_number }}" \
            --notes "Automated build from commit ${{ github.sha }}"
